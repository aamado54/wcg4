<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PGC - WCG</title>
    {% load static %}
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #111827;
      }

      .splash-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        cursor: pointer;
        background: #111827;
      }

      .splash-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
        display: block;
      }

      .splash-portrait {
        display: none;
      }

      .hint {
        position: absolute;
        bottom: 24px;
        right: 24px;
        padding: 8px 12px;
        border-radius: 6px;
        background: rgba(0,0,0,0.45);
        color: #f9fafb;
        font-family: Arial, sans-serif;
        font-size: 0.9rem;
      }

      @media (max-width: 768px) {
        .hint {
          left: 16px;
          right: 16px;
          text-align: center;
        }
      }

      @media (orientation: portrait) {
        .splash-landscape {
          display: none;
        }

        .splash-portrait {
          display: block;
        }

        .hint {
          display: none;
        }
      }
    </style>
</head>
<body>
    <div class="splash-wrapper" id="splash-root">
        <img
          class="splash-img splash-landscape"
          src="{% static 'img/splash.jpg' %}"
          alt="PGC - Working Capital Group"
        >
        <img
          class="splash-img splash-portrait"
          src="{% static 'img/splashv.jpg' %}"
          alt="PGC - Working Capital Group"
        >

        <div class="hint">
            Haz clic o presiona cualquier tecla para entrar al tablero.
        </div>
    </div>

    <script>
    (function () {
        function goDashboard() {
            window.location.href = "{% url 'portal:home' %}";
        }

        var root = document.getElementById("splash-root");

        if (root) {
            root.addEventListener("click", function (e) {
                e.preventDefault();
                goDashboard();
            });
        }

        document.addEventListener("keydown", function () {
            goDashboard();
        });
    })();
    </script>
</body>
</html>
