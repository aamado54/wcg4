<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}WCG One{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --wcg-navy: #1a2b4a;
      --wcg-accent: #2c6e9b;
      --wcg-light: #f4f6f9;
    }
    body { background-color: var(--wcg-light); min-height: 100vh; }
    .navbar-wcg { background-color: var(--wcg-navy) !important; }
    .navbar-wcg .navbar-brand,
    .navbar-wcg .nav-link { color: rgba(255,255,255,.9) !important; }
    .navbar-wcg .nav-link:hover,
    .navbar-wcg .nav-link.active { color: #fff !important; }
    .card-module { transition: box-shadow .15s ease; border: none; }
    .card-module:hover { box-shadow: 0 .5rem 1rem rgba(0,0,0,.1); }
    .card-module .card-header { background: var(--wcg-navy); color: #fff; font-weight: 600; }
    .table-wcg thead { background: var(--wcg-navy); color: #fff; }
    .table-wcg thead th { font-weight: 500; font-size: .875rem; border: none; }
    .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--wcg-navy); }
    .breadcrumb { background: transparent; padding-left: 0; margin-bottom: 1rem; }
    main { padding-bottom: 3rem; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% include "includes/navbar.html" %}

  <main class="container py-4">
    {% include "includes/messages.html" %}
    {% include "includes/breadcrumbs.html" %}

    {% block content %}{% endblock %}
  </main>

  <footer class="border-top bg-white py-3 mt-auto">
    <div class="container text-muted small">
      WCG One — Working Capital Group
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
