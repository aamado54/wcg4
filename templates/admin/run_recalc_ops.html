{% extends "admin/base_site.html" %}

{% block content %}
  <div id="content-main">
    <form method="post">
      {% csrf_token %}

      <fieldset class="module aligned">
        <h2>Parámetros</h2>
        {{ form.as_p }}
      </fieldset>

      <div class="submit-row">
        <input type="submit" value="Ejecutar" class="default">
        <a href="{% url 'admin:core_systemsetting_changelist' %}" class="button">Cancelar</a>
      </div>
    </form>
  </div>
{% endblock %}
