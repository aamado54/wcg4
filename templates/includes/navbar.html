<nav class="navbar navbar-expand-lg navbar-dark navbar-wcg shadow-sm">

    <a class="navbar-brand fw-semibold" href="{% url 'portal:home' %}">WCG One</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#wcgNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="wcgNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link{% if '/tablero/' in request.path or '/pgc/' in request.path %} active{% endif %}" href="{% url 'pgc:dashboard' %}">PGC</a>
        </li>
        <li class="nav-item">
          <a class="nav-link{% if '/crm/' in request.path %} active{% endif %}" href="{% url 'wcgone_crm:entidad_list' %}">CRM</a>

        <li class="nav-item">

        </li>
      </ul>

        <li class="nav-item">
          <a class="nav-link" href="/admin/" target="_blank" rel="noopener">Admin</a>
        </li>
        <li class="nav-item">
          <span class="nav-link disabled text-white-50">{{ user.get_username }}</span>
        </li>

          <form method="post" action="{% url 'logout' %}" class="d-inline">

            <button type="submit" class="btn btn-link nav-link">Salir</button>
          </form>
